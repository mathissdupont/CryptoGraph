services:
  cryptograph:
    build: .
    image: cryptograph:dev
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: ["cryptograph"]
    command: ["scan", "--input", "samples", "--output", "/app/output/result.json"]

  cbom-viewer:
    build: ./viewer
    ports:
      - "8501:8501"
    volumes:
      - ./output:/app/output:ro
